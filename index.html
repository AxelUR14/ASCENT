<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascent - Galería</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Menú Lateral -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul class="menu-list">
                    <li>
                        <a href="#" class="menu-item active" data-content="inicio">
                            <span class="menu-icon">🏠</span>
                            <span class="menu-text">Inicio</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="menu-item" data-content="galeria">
                            <span class="menu-icon">🖼️</span>
                            <span class="menu-text">Galería</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="menu-item" data-content="reportes">
                            <span class="menu-icon">📊</span>
                            <span class="menu-text">Reportes</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-content">
            <!-- Contenedor de Contenido Dinámico -->
            <div id="content-frame">
                <div id="inicio-content" class="content-view active">
                    <h1>Bienvenido a Ascent</h1>
                    <p>Explora nuestra galería de productos exclusivos.</p>
                </div>

                <div id="galeria-content" class="content-view">
                    <h2>Nuestra Galería</h2>
                    <div class="image-gallery"></div>
                </div>

                <div id="reportes-content" class="content-view">
                    <h2>Reportes de Productos</h2>
                    <div class="reports-container"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
