<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema con Menú Lateral</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Menú Lateral -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul class="menu-list">
                    <li>
                        <a href="#" class="menu-item active" data-content="inicio">
                            <span class="material-symbols-outlined">home</span>
                            <span class="menu-text">Inicio</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="menu-item" data-content="galeria">
                            <span class="material-symbols-outlined">photo_library</span>
                            <span class="menu-text">Galería</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="menu-item" data-content="reportes">
                            <span class="material-symbols-outlined">assessment</span>
                            <span class="menu-text">Reportes</span>
                        </a>
                    </li>
                    <li class="menu-separator"></li>
                    <li>
                        <a href="#" class="menu-item" data-content="configuracion">
                            <span class="material-symbols-outlined">settings</span>
                            <span class="menu-text">Configuración</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-content">
            <!-- Logo Central -->
            <div class="logo-central">
                <img src="assets/logo.png" alt="Logo de la empresa" class="logo-img">
                <h1 class="system-title">Sistema de Gestión</h1>
            </div>

            <!-- Contenedor de Contenido Dinámico -->
            <div class="content-frame">
                <!-- Vista de Inicio -->
                <div id="inicio-content" class="content-view active">
                    <h2>Bienvenido al Sistema</h2>
                    <p>Selecciona una opción del menú para comenzar.</p>
                </div>

                <!-- Vista de Galería -->
                <div id="galeria-content" class="content-view">
                    <h2>Galería de Imágenes</h2>
                    <div class="image-gallery"></div>
                </div>

                <!-- Vista de Reportes -->
                <div id="reportes-content" class="content-view">
                    <h2>Reportes Estadísticos</h2>
                    <div class="reports-container"></div>
                </div>

                <!-- Vista de Configuración -->
                <div id="configuracion-content" class="content-view">
                    <h2>Configuración del Sistema</h2>
                    <div class="settings-form"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
