<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Menú -->
        <header class="header">
            <nav class="nav-bar">
                <button class="nav-item active" data-section="inicio">Inicio</button>
                <button class="nav-item" data-section="seccion1">Sección 1</button>
                <button class="nav-item" data-section="seccion2">Sección 2</button>
                <button class="nav-item" data-section="seccion3">Sección 3</button>
            </nav>
        </header>

        <!-- Contenido Principal -->
        <main class="main-content">
            <!-- Inicio -->
            <section id="inicio" class="section active">
                <h1>Ascent tienda de ropa deportiva importada</h1>
                <p>En el menu encontraras nuestro catalogo completo dividido en secciones</p>
            </section>

            <!-- Sección 1 -->
            <section id="seccion1" class="section">
                <h2>Youngla</h2>
                <div class="gallery"></div>
            </section>

            <!-- Sección 2 -->
            <section id="seccion2" class="section">
                <h2>Shark</h2>
                <div class="gallery"></div>
            </section>

            <!-- Sección 3 -->
            <section id="seccion3" class="section">
                <h2>Marca propia</h2>
                <div class="gallery"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
